name: Daily Database Update

on:
  schedule:
    - cron: '30 20 * * *' # 10:30 PM UTC (aprox 11:30 PM Israel depending on DST)
  workflow_dispatch: 

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.AUTO_UPDATE_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        run: python automate_db_update.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history_processing/*.csv history_processing/*.json frontend/public/shelter_sessions.json
          git commit -m "Automated database update [skip ci]" || echo "No changes to commit"
          git push
